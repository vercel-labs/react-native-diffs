name: Publish Package to npmjs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0-alpha.4)'
        required: true
      dist-tag:
        description: 'npm dist-tag to publish under'
        required: false
        default: 'alpha'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
      - name: Install npm 11.5.1+ (required for trusted publishing)
        run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run prepare
      - name: Set version
        if: github.event_name == 'workflow_dispatch'
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_VERCEL_TOKEN_ELEVATED }}
        run: npm publish --access public --tag ${{ github.event.inputs.dist-tag || 'alpha' }}
